services:
  mongo:
    image: mongo:7
    container_name: mern_mongo_prod
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data_prod:/data/db

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.prod
    container_name: mern_server_prod
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env.docker
    depends_on:
      - mongo
    volumes:
      - ./server/uploads:/app/uploads

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.prod
      args:
        - VITE_API_URL=/api
        - VITE_SERVER_URL=http://localhost:5000
    container_name: mern_client_prod
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  mongo_data_prod:
